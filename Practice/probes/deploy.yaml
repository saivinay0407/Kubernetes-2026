apiVersion: apps/v1
kind: Deployment
metadata:
  name: pod1
  labels:
    pod: pod1
spec:
  replicas: 1
  selector:
    matchLabels:
      pod: pod1
  template:
    metadata:
      labels:
        pod: pod1
    spec:
      containers:
        - name: pod1
          image: httpd
          ports:
            - containerPort: 8080
          args:
            - /bin/sh
            - "-c"
            - touch /tmp/health; sleep 1000
          livenessProbe:
           exec:
             command:
               - cat
               - /tmp/health
           initialDelaySeconds: 30
           periodSeconds: 10
           failureThreshold: 3

          startupProbe:
             exec:
               command:
                 - cat
                 - /tmp/health
             initialDelaySeconds: 10
             periodSeconds: 10
             failureThreshold: 3
