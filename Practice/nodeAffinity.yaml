apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-deployment
  labels:
    app: my-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
      - name: cont-1
        image: nginx
        ports:
        - containerPort: 80
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key : "disktype"
                operator: In
                values:
                - ssd

            

      # # taint an tolarations
      # tolerations:
      # - key: "gpu"
      #   operator: "Equal"
      #   value: "true"
      #   effect: "NoSchedule"

